<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invite</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>

body {
  margin:0;
  padding:0;
  overflow-x:hidden;
  font-family:'Poppins', sans-serif;
  background:#fdf6ec;
  scroll-behavior:smooth;
}

section{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:30px;
}

/* GATE SCREEN */

#gateContainer{
  position:fixed;
  width:100%;
  height:100vh;
  display:flex;
  z-index:9999;
}

.gate{
  width:50%;
  height:100%;
  background:linear-gradient(to bottom,#c6a75e,#a8842f);
  transition:1.8s ease;
}

.open-left{
  transform:translateX(-100%);
}

.open-right{
  transform:translateX(100%);
}

#openButton{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:15px 35px;
  background:white;
  border:none;
  font-size:16px;
  cursor:pointer;
  font-family:'Playfair Display', serif;
}

/* Floral Background */

.floral{
  background:url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486?auto=format&fit=crop&w=1200&q=80');
  background-size:cover;
  background-position:center;
  color:white;
  position:relative;
}

.overlay{
  background:rgba(0,0,0,0.5);
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
}

.content{
  position:relative;
  z-index:2;
}

h1{
  font-family:'Great Vibes', cursive;
  font-size:60px;
  margin:10px 0;
}

h2{
  font-family:'Playfair Display', serif;
  font-size:28px;
  margin:10px 0;
}

.fade{
  opacity:0;
  transform:translateY(20px);
  transition:1.2s ease;
}

.fade.show{
  opacity:1;
  transform:translateY(0);
}

.map iframe{
  width:90%;
  height:300px;
  border:0;
  margin-top:20px;
}

.footer{
  background:#a8842f;
  color:white;
  padding:20px;
  text-align:center;
}

</style>
</head>

<body>

<!-- GATE -->
<div id="gateContainer">
  <div id="leftGate" class="gate"></div>
  <div id="rightGate" class="gate"></div>
  <button id="openButton" onclick="openGate()">Tap To Open</button>
</div>

<!-- MAIN CONTENT -->

<section class="floral">
  <div class="overlay"></div>
  <div class="content fade">
    <h2>With the blessings of our parents</h2>
    <h1>Aarav <br>&<br> Ananya</h1>
    <h2>Are Getting Married</h2>
  </div>
</section>

<section>
  <div class="fade">
    <h2>Save The Date</h2>
    <h2>21 December 2026</h2>
    <h2>Jaipur, Rajasthan</h2>
  </div>
</section>

<section class="floral">
  <div class="overlay"></div>
  <div class="content fade">
    <h2>Wedding Ceremony</h2>
    <h2>7:00 PM Onwards</h2>
  </div>
</section>

<section class="map">
  <div class="fade">
    <h2>Venue</h2>
    <iframe 
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3559.189...">
    </iframe>
  </div>
</section>

<div class="footer">
  <h2>We can't wait to celebrate with you ✨</h2>
</div>

<script>

function openGate(){
  document.getElementById("leftGate").classList.add("open-left");
  document.getElementById("rightGate").classList.add("open-right");
  document.getElementById("openButton").style.display="none";
  setTimeout(function(){
    document.getElementById("gateContainer").style.display="none";
  },1800);
}

const faders=document.querySelectorAll('.fade');

const observer=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
},{threshold:0.3});

faders.forEach(f=>observer.observe(f));

</script>

</body>
</html>
