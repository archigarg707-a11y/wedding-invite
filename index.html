<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aarav & Ananya Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Cinzel', serif;
    background:url('https://images.unsplash.com/photo-1523438885200-e635ba2c371e') no-repeat center center/cover;
    color:white;
    text-align:center;
    overflow-x:hidden;
}

section {
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:20px;
    backdrop-filter: brightness(0.6);
}

h1 {
    font-family:'Great Vibes', cursive;
    font-size:60px;
}

h2 {
    font-size:30px;
    margin-top:20px;
}

button {
    padding:12px 30px;
    background:gold;
    border:none;
    font-size:18px;
    cursor:pointer;
    margin-top:20px;
    border-radius:30px;
}

.gate {
    position:fixed;
    width:50%;
    height:100%;
    background:url('https://images.unsplash.com/photo-1519681393784-d120267933ba') center/cover;
    top:0;
    transition:2s ease;
    z-index:1000;
}

#leftGate {
    left:0;
}

#rightGate {
    right:0;
}

.open #leftGate {
    transform:translateX(-100%);
}

.open #rightGate {
    transform:translateX(100%);
}

.fade {
    opacity:0;
    transform:translateY(30px);
    transition:1.5s;
}

.visible {
    opacity:1;
    transform:translateY(0);
}
</style>
</head>

<body>

<div id="leftGate" class="gate"></div>
<div id="rightGate" class="gate"></div>

<section id="main">
    <h1>Two Souls</h1>
    <h1>One Forever</h1>
    <button onclick="openGate()">Tap To Open</button>
</section>

<section class="fade">
    <h1>Aarav & Ananya</h1>
    <h2>Are Getting Married</h2>
</section>

<section class="fade">
    <h2>Save The Date</h2>
    <p>21 December 2026</p>
</section>

<section class="fade">
    <h2>Wedding Events</h2>
    <p>Haldi – 19 Dec</p>
    <p>Mehendi – 20 Dec</p>
    <p>Wedding – 21 Dec</p>
</section>

<section class="fade">
    <h2>Venue</h2>
    <p>Royal Palace, Jaipur</p>
    <iframe 
    src="https://www.google.com/maps/embed?pb=!1m18!..." 
    width="300" height="200" style="border:0;" allowfullscreen="">
    </iframe>
</section>

<script>
function openGate(){
    document.body.classList.add('open');
}

const faders=document.querySelectorAll('.fade');

const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add('visible');
}
});
},{threshold:0.3});

faders.forEach(el=>observer.observe(el));
</script>

</body>
</html>
